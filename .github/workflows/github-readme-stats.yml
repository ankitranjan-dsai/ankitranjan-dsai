name: Generate GitHub Readme Stats

on:
  schedule:
    - cron: '7 7 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clone github-readme-stats
        run: |
          git clone --depth 1 https://github.com/anuraghazra/github-readme-stats.git /tmp/gh-readme-stats

      - name: Install dependencies
        run: |
          cd /tmp/gh-readme-stats
          npm install

      - name: Generate SVGs
        env:
          PAT_1: ${{ secrets.GH_STATS_TOKEN }}
        run: node .github/scripts/generate-github-stats.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/dashboard.svg assets/languages.svg
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update github-readme-stats SVGs [skip ci]"
            git push
          fi
