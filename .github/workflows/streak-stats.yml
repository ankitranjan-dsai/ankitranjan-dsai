# GitHub Actions workflow to generate self-hosted streak-stats SVGs
# using DenverCoder1/github-readme-streak-stats (runs locally on the runner).
# If private contribution data is needed, replace secrets.GITHUB_TOKEN with a PAT.
name: Update GitHub Streak Stats

on:
  schedule:
    - cron: "0 4 * * *"   # Daily at 04:00 UTC
  push:
    paths:
      - ".github/workflows/streak-stats.yml"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate streak stats (light)
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&theme=default&disable_animations=true
          path: assets/streak-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak stats (dark)
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&theme=dark&disable_animations=true
          path: assets/streak-stats-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push streak stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/streak-stats.svg assets/streak-stats-dark.svg
          git commit -m "chore: update GitHub streak stats SVGs" || exit 0
          git pull --rebase origin main || true
          git push
