name: Generate Activity Graph
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate activity-graph.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ankitranjan-dsai
        run: |
          python3 << 'PYSCRIPT'
          import os, json, urllib.request, textwrap

          TOKEN = os.environ['GITHUB_TOKEN']
          USERNAME = os.environ['USERNAME']

          query = """
          query($login: String!) {
            user(login: $login) {
              contributionsCollection {
                contributionCalendar {
                  totalContributions
                  weeks {
                    contributionDays {
                      date
                      contributionCount
                    }
                  }
                }
              }
            }
          }
          """
          req = urllib.request.Request(
              'https://api.github.com/graphql',
              data=json.dumps({'query': query, 'variables': {'login': USERNAME}}).encode(),
              headers={'Authorization': f'Bearer {TOKEN}', 'Content-Type': 'application/json'},
          )
          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read().decode())

          weeks = data['data']['user']['contributionsCollection']['contributionCalendar']['weeks']
          weekly = [sum(d['contributionCount'] for d in w['contributionDays']) for w in weeks]
          if len(weekly) < 53:
              weekly = [0] * (53 - len(weekly)) + weekly
          else:
              weekly = weekly[-53:]

          max_c = max(weekly) if max(weekly) > 0 else 1
          total = sum(weekly)

          W, H = 800, 200
          PAD_L, PAD_R = 50, 30
          PAD_T, PAD_B = 40, 50
          GW = W - PAD_L - PAD_R
          GH = H - PAD_T - PAD_B

          def x(i):
              return PAD_L + (i / (len(weekly) - 1)) * GW

          def y(v):
              return PAD_T + GH - (v / max_c) * GH

          points = ' '.join(f'{x(i):.1f},{y(v):.1f}' for i, v in enumerate(weekly))
          area_pts = f'{x(0):.1f},{PAD_T+GH} {points} {x(len(weekly)-1):.1f},{PAD_T+GH}'

          months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']
          month_ticks = []
          for idx, m in enumerate(months):
              xi = PAD_L + (idx / 11) * GW
              month_ticks.append(f'<text x="{xi:.1f}" y="{H-15}" fill="#8b949e" font-size="10" text-anchor="middle" font-family="Segoe UI, Ubuntu, sans-serif">{m}</text>')

          svg = textwrap.dedent(f"""\
          <?xml version="1.0" encoding="UTF-8"?>
          <svg xmlns="http://www.w3.org/2000/svg" width="{W}" height="{H}" viewBox="0 0 {W} {H}">
            <rect width="{W}" height="{H}" rx="12" fill="#0d1117"/>
            <text x="20" y="26" fill="#c9d1d9" font-size="14" font-weight="600" font-family="Segoe UI, Ubuntu, sans-serif">{USERNAME}'s Contribution Graph</text>
            <text x="{W-20}" y="26" fill="#8b949e" font-size="11" text-anchor="end" font-family="Segoe UI, Ubuntu, sans-serif">{total} contributions in the last year</text>
            <g stroke="#21262d" stroke-width="1">
              <line x1="{PAD_L}" y1="{PAD_T}" x2="{W-PAD_R}" y2="{PAD_T}"/>
              <line x1="{PAD_L}" y1="{PAD_T+GH/2:.1f}" x2="{W-PAD_R}" y2="{PAD_T+GH/2:.1f}"/>
              <line x1="{PAD_L}" y1="{PAD_T+GH}" x2="{W-PAD_R}" y2="{PAD_T+GH}"/>
            </g>
            <text x="{PAD_L-10}" y="{PAD_T+4}" fill="#8b949e" font-size="9" text-anchor="end" font-family="Segoe UI, Ubuntu, sans-serif">{max_c}</text>
            <text x="{PAD_L-10}" y="{PAD_T+GH/2+4:.1f}" fill="#8b949e" font-size="9" text-anchor="end" font-family="Segoe UI, Ubuntu, sans-serif">{max_c//2}</text>
            <text x="{PAD_L-10}" y="{PAD_T+GH+4:.1f}" fill="#8b949e" font-size="9" text-anchor="end" font-family="Segoe UI, Ubuntu, sans-serif">0</text>
            <polygon points="{area_pts}" fill="rgba(88,166,255,0.15)"/>
            <polyline points="{points}" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            {''.join(month_ticks)}
          </svg>
          """)

          os.makedirs('assets', exist_ok=True)
          with open('assets/activity-graph.svg', 'w', encoding='utf-8') as f:
              f.write(svg)
          print('Generated assets/activity-graph.svg')
          PYSCRIPT

      - name: Commit & push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/activity-graph.svg
          if git diff --cached --quiet; then
            echo 'No changes to commit'
          else
            git commit -m 'chore: update activity-graph.svg [skip ci]'
            git push
          fi
