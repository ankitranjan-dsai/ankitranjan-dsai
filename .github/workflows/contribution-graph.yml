name: Update Contribution Graph

on:
  schedule:
    - cron: "23 2 * * *"   # daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Generate graph (GitHub GraphQL, own token — no third-party API)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/generate_contribution_graph.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/contribution-graph.svg
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh contribution graph [skip ci]"
            git push
          fi
